<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Fitness | Push Your Limits</title>
    <meta name="description" content="Premium gym and fitness center offering personal training, group classes, and state-of-the-art equipment.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    
    <!-- Abstract Background Energy Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <header class="main-header">
        <nav class="navbar animate-on-load" style="--delay: 0.1s">
            <a href="#" class="brand-logo">APEX<span class="text-accent">FIT</span></a>
            <ul class="nav-links">
                <li><a href="#">Classes</a></li>
                <li><a href="#">Trainers</a></li>
                <li><a href="#">Memberships</a></li>
                <li><a href="#" class="btn-primary-outline">Free Trial</a></li>
            </ul>
        </nav>

        <section class="hero-section">
            <div class="hero-content">
                <span class="badge animate-on-load" style="--delay: 0.3s">New Facility Now Open</span>
                <h1 class="hero-title animate-on-load" style="--delay: 0.5s">
                    Unleash your <br> <span class="text-gradient">true potential.</span>
                </h1>
                <p class="hero-subtitle animate-on-load" style="--delay: 0.7s">
                    Join the most dynamic fitness community. State-of-the-art equipment, elite personal trainers, and classes designed to push you beyond your limits.
                </p>
                <div class="hero-actions animate-on-load" style="--delay: 0.9s">
                    <button class="btn-primary">Join Now</button>
                    <button class="btn-secondary">View Schedule</button>
                </div>
            </div>

            <div class="hero-visuals">
                <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop" alt="Athlete training" class="hero-img animate-on-load" style="--delay: 1.1s">
            </div>
        </section>
    </header>

    <script src="./js/script.js"></script>
</body>
</html>
