<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLib | Personal Book Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel main-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 19V5C4 3.89543 4.89543 3 6 3H19.4C19.7314 3 20 3.26863 20 3.6V16.7143C20 17.9222 19.3662 19.0413 18.3168 19.6457L18.069 19.7884C17.0625 20.3681 15.854 20.4851 14.767 20.1171L4.8554 16.7645C4.33129 16.5872 4 16.0963 4 15.5457V19Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round"/>
                    <path d="M6 3V19C6 20.1046 6.89543 21 8 21H17.5" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="4" y1="3" x2="20" y2="21" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#8B5CF6"/>
                            <stop offset="1" stop-color="#3B82F6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>NexLib</h1>
            </div>
            <div class="header-controls">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Search books, authors...">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <select id="categoryFilter" class="custom-select">
                    <option value="All">All Categories</option>
                    <option value="Fiction">Fiction</option>
                    <option value="Non-Fiction">Non-Fiction</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Classic">Classic</option>
                    <option value="Self-Help">Self-Help</option>
                    <option value="Technology">Technology</option>
                </select>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="tabs">
                <button class="tab-btn active" data-tab="all">Library</button>
                <button class="tab-btn" data-tab="borrowed">Borrowed History</button>
            </div>

            <div class="stats-bar glass-panel">
                <div class="stat">
                    <span class="stat-label">Total Books</span>
                    <span class="stat-value" id="totalBooksCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Currently Borrowed</span>
                    <span class="stat-value" id="borrowedBooksCount">0</span>
                </div>
            </div>

            <!-- Books Grid -->
            <div id="booksGrid" class="books-grid">
                <!-- Book cards will be injected here via JS -->
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="empty-state hidden">
                <div class="empty-icon">📚</div>
                <h3>No books found</h3>
                <p>Try adjusting your search or filters.</p>
            </div>
        </main>
    </div>

    <!-- Book Details Modal -->
    <div id="bookModal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <div class="modal-body" id="modalBody">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
